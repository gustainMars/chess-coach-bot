name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2 stockfish

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest bot/tests/ -q --tb=short

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -e
            cd chess-coach-bot
            git pull origin main
            docker build -t chess-bot .
            docker stop chess-bot 2>/dev/null || true
            docker rm chess-bot 2>/dev/null || true
            docker run -d --restart=always \
              -v /data/chess:/app/data \
              -e TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }} \
              -e DATABASE_URL=sqlite+aiosqlite:////app/data/chess.db \
              -e STOCKFISH_PATH=stockfish \
              --name chess-bot chess-bot

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Learn an Opening</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="../shared/base.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1 id="ui-title"></h1>
    <select id="opening-select" disabled></select>
  </header>

  <div id="board-wrap">
    <svg id="board" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="file-labels"></div>
  </div>

  <div id="move-counter"></div>

  <div id="status"></div>

  <div id="nav-row">
    <button id="prev-btn" class="screen-btn nav-btn" disabled></button>
    <button id="next-btn" class="screen-btn nav-btn" disabled></button>
  </div>

  <button id="test-btn" class="screen-btn" hidden></button>

  <script type="module" src="main.js"></script>

</body>
</html>
